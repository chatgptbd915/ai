<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NusAI Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 h-screen flex flex-col">

<header class="bg-white p-4 shadow">
<h1 class="text-xl font-bold">NusAI Chatbot</h1>
</header>

<main id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-3">
<div class="bg-white p-3 rounded">Hello! I'm NusAI 👋</div>
</main>

<footer class="p-4 bg-white flex gap-2">
<input id="user-input" class="flex-1 border p-2 rounded" placeholder="Type...">
<button onclick="sendMessage()" class="bg-blue-600 text-white px-4 rounded">Send</button>
</footer>

<script>
const chatBox = document.getElementById("chat-box");

function addMessage(text, user=false){
    const div = document.createElement("div");
    div.className = user ? "text-right" : "text-left";
    div.innerHTML = `<span class="inline-block p-2 rounded ${user ? 'bg-blue-600 text-white' : 'bg-white'}">${text}</span>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if(!message) return;

    addMessage(message, true);
    input.value = "";

    try {
        const res = await fetch("http://localhost:3000/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message })
        });

        const data = await res.json();
        addMessage(data.reply);

    } catch {
        addMessage("⚠️ Server offline");
    }
}
</script>

</body>
</html>
